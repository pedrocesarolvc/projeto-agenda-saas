# SPA com roteamento no cliente (React Router, Etapa 7): qualquer
# caminho que nao seja um arquivo estatico cai de volta no
# index.html, senao um refresh em /agenda daria 404 no nginx.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
